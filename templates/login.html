{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">로그인</h2>
        <form method="POST" action="">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="아이디를 입력하세요">
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="비밀번호를 입력하세요">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">로그인하기</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                계정이 없으신가요? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: bold; text-decoration: none;">회원가입</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
